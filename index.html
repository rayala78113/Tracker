<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSAR Task Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 1rem; color: #333; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 1rem; color: #1a1a1a; text-align: center; }

    .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
    .tab-btn { flex: 1; padding: 1rem; border: none; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; color: #fff; }
    .tab-btn[data-tab="master"] { background: #1a5276; }
    .tab-btn[data-tab="todo"] { background: #d4ac0d; color: #333; }
    .tab-btn[data-tab="followup"] { background: #c0392b; }
    .tab-btn.active { outline: 3px solid #333; outline-offset: -3px; }

    .view-banner { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1.5rem; text-align: center; font-weight: 600; font-size: 16px; color: #fff; }
    .view-banner.master { background: #1a5276; }
    .view-banner.todo { background: #d4ac0d; color: #333; }
    .view-banner.followup { background: #c0392b; }

    .add-form { background: #fff; padding: 1.25rem; border-radius: 8px; margin-bottom: 1.5rem; border: 1px solid #ddd; }
    .add-form h2 { font-size: 16px; margin-bottom: 0.75rem; }
    .form-row { display: flex; gap: 8px; }
    .form-row input { flex: 1; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .form-row input:focus { outline: none; border-color: #1a5276; }
    .form-row button { padding: 0.75rem 1.25rem; border: none; background: #1a5276; color: #fff; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }

    .task-list { display: grid; gap: 0.75rem; margin-bottom: 1.5rem; }

    .task-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 1rem; }
    .task-card.is-complete { border-left: 4px solid #27ae60; }
    .task-card.is-followup { border-left: 4px solid #c0392b; }
    .task-card.is-complete.is-followup { border-left: 4px solid #e67e22; }

    .task-top { display: flex; align-items: flex-start; gap: 10px; }
    .task-number { font-weight: 700; color: #999; min-width: 36px; font-size: 14px; padding-top: 2px; }
    .task-content { flex: 1; min-width: 0; }
    .task-text { font-size: 15px; color: #1a1a1a; word-break: break-word; margin-bottom: 4px; }
    .task-text.done { text-decoration: line-through; color: #999; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; vertical-align: middle; }
    .badge-complete { background: #d5f5e3; color: #1e8449; }
    .badge-followup { background: #fadbd8; color: #922b21; }
    .badge-partial { background: #fdebd0; color: #b9770e; }

    .task-actions { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
    .btn-complete { padding: 6px 10px; border-radius: 6px; border: 1px solid #27ae60; background: #d5f5e3; color: #1e8449; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-followup { padding: 6px 10px; border-radius: 6px; border: 1px solid #c0392b; background: #fadbd8; color: #922b21; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-notes { padding: 6px 10px; border-radius: 6px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-complete:hover, .btn-followup:hover, .btn-notes:hover { opacity: 0.8; }

    .task-notes-display { margin-top: 8px; padding: 8px 10px; background: #f9f9f9; border-radius: 6px; font-size: 13px; color: #555; white-space: pre-wrap; word-break: break-word; }
    .note-entry { border-bottom: 1px solid #eee; padding: 4px 0; }
    .note-entry:last-child { border-bottom: none; }
    .note-date { font-size: 11px; color: #999; }

    .notes-editor { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
    .notes-editor textarea { width: 100%; min-height: 70px; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; resize: vertical; }
    .notes-editor textarea:focus { outline: none; border-color: #1a5276; }
    .notes-editor button { margin-top: 8px; padding: 8px 16px; border: none; background: #1a5276; color: #fff; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }

    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
    .stat-card { background: #fff; padding: 1rem; border-radius: 8px; border: 1px solid #ddd; text-align: center; }
    .stat-label { font-size: 11px; color: #999; margin-bottom: 4px; }
    .stat-number { font-size: 22px; font-weight: 700; }
    .stat-number.total { color: #1a5276; }
    .stat-number.complete { color: #27ae60; }
    .stat-number.remaining { color: #d4ac0d; }
    .stat-number.followup { color: #c0392b; }

    .empty-state { text-align: center; padding: 2rem; color: #999; font-size: 14px; }
    .hidden { display: none; }
    .loading { text-align: center; padding: 2rem; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TSAR Task Tracker</h1>

    <div class="tabs">
      <button class="tab-btn active" data-tab="master" onclick="switchTab('master')">Master</button>
      <button class="tab-btn" data-tab="todo" onclick="switchTab('todo')">Do List</button>
      <button class="tab-btn" data-tab="followup" onclick="switchTab('followup')">Follow-Up</button>
    </div>

    <div class="view-banner master" id="viewBanner">Master List</div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total</div>
        <div class="stat-number total" id="totalCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Complete</div>
        <div class="stat-number complete" id="completeCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">To Do</div>
        <div class="stat-number remaining" id="remainingCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Follow-Up</div>
        <div class="stat-number followup" id="followupCount">0</div>
      </div>
    </div>

    <div class="add-form">
      <h2>Add a new task</h2>
      <div class="form-row">
        <input type="text" id="newTask" placeholder="Task name..." />
        <button onclick="addTask()">+ Add</button>
      </div>
    </div>

    <div id="loadingMessage" class="loading">Loading tasks...</div>
    <div class="task-list" id="taskList"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://jbnufforfpgawnawgujv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpibnVmZm9yZnBnYXduYXdndWp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQ1MjI1OTIsImV4cCI6MjA1MDA5ODU5Mn0.FT3z6Yedzrc-lL8cnIKC4Q_ydJE-BW3i_WCUdcSNEco';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let tasks = [];
    let currentTab = 'master';
    let expandedNotes = {};

    const initialTasks = [
      "PHMSA OSRP Plan – LOC", "Check SDS sheets at each location", "Ensure chemical awareness from team ops",
      "SOPs reviewed", "MOC for TSAR Block Valves", "MOC for chemical change", "MOC for FCT water drop coupon",
      "MOC for LACT 5 PCV (back pressure valve)", "Lessons learned from audit – revisions/forms",
      "Updated forms for line crossing", "Order peroxide for test", "Send Ryan SPCC findings for Casey corrections",
      "SPCC FCT tanks – questions with attorneys", "LONO Request – reply pending", "Schedule SPL Testing",
      "Update for IMP plan", "Update for foreign line crossing/exposed pipeline report", "VFD PM at Elm",
      "Check all ESD shutdowns at Elm", "Setpoint PSVs at Elmendorf", "LACT 5 back pressure valve",
      "Rebuild MOV 71 actuator", "Fireproofing at Elmendorf", "Paint pipeline valves", "FCT boosters / strainers PM",
      "Transfer pump installation (Elmendorf)", "Tank 102 cleanout plan", "Filter pod baskets remake (Angus)",
      "Filter screens – TSAR pipeline entry strainer", "FCT pad repair", "Block Valve #4 actuator mounting",
      "Schedule PSV swap-outs", "Schedule valve inspections", "Order proving valve – TSAR incoming skid",
      "Source correct replacement valve (David WO)", "Issue PO – MIS pig run XYZ (TSAR jumper)",
      "PO for transfer pump (United)", "Paradigm Req 3452", "Block Valve #4 painting", "Block Valve #3 painting",
      "Train pig (Kevin Wheeler)", "Check sample pot lineup – Elm", "Water drop inspection – TSAR entry skid",
      "Tank inspections – Pinnacle", "Piping inspection – Elm & FCT", "Coupon report",
      "Tank inspection review with David", "SPL Testing execution", "FT1 Meter Proving (Calibration)",
      "Annual pressure transmitter testing", "Truck inspections (daily)", "4603 water draw",
      "Monthly fire extinguisher inspections (FCT & Elm)", "Investigate LEL alarms – FCT (P1002)",
      "Update KNPS overview (alarm responsibilities)", "Upload DuPont schedule and align coverage",
      "Confirm ACS PM completed – Elmendorf", "Air vent cleaning quotes", "Follow up MIS – commodity release alarm",
      "Firewall/comms update request (MIS)", "MOC – add LEL tags to SCADA", "Backup internet (Jacob)",
      "GIS mapping (Meghan – Cumberland)", "Enable TMS6 login all locations", "Upload IMP to SharePoint",
      "Meter proving sheets saved", "Legacy Rockwell software", "Cayman Cargo MSA", "Adam Grier MSA",
      "Wade & Vic connection agreement", "Watch Aerial coordination", "Rosen report", "Refined Land Services invoice",
      "FCT SDV / PSV study meeting", "Transfer pump setup (engineering)"
    ];

    async function initializeDatabase() {
      const { data: existingTasks, error: fetchError } = await supabase
        .from('tasks')
        .select('*');

      if (fetchError && fetchError.code !== 'PGRST116') {
        console.error('Error fetching tasks:', fetchError);
      }

      if (!existingTasks || existingTasks.length === 0) {
        const tasksToInsert = initialTasks.map((text, i) => ({
          number: i + 1,
          text: text,
          completed: false,
          followup: false,
          notes: [],
          date_added: new Date().toISOString().split('T')[0]
        }));

        const { error: insertError } = await supabase
          .from('tasks')
          .insert(tasksToInsert);

        if (insertError) console.error('Error inserting initial tasks:', insertError);
      }
    }

    async function loadTasks() {
      const { data, error } = await supabase
        .from('tasks')
        .select('*')
        .order('number', { ascending: true });

      if (error) {
        console.error('Error loading tasks:', error);
        return;
      }

      tasks = data || [];
      document.getElementById('loadingMessage').style.display = 'none';
      render();
    }

    async function init() {
      await initializeDatabase();
      await loadTasks();
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });
      const banner = document.getElementById('viewBanner');
      banner.className = 'view-banner ' + tab;
      if (tab === 'master') banner.textContent = 'Master List';
      else if (tab === 'todo') banner.textContent = 'Do List';
      else banner.textContent = 'Follow-Up List';
      render();
    }

    async function addTask() {
      const input = document.getElementById('newTask');
      const text = input.value.trim();
      if (!text) return;

      const newNumber = Math.max(...tasks.map(t => t.number), 0) + 1;
      const newTask = {
        number: newNumber,
        text: text,
        completed: false,
        followup: false,
        notes: [],
        date_added: new Date().toISOString().split('T')[0]
      };

      const { data, error } = await supabase
        .from('tasks')
        .insert([newTask])
        .select();

      if (error) {
        console.error('Error adding task:', error);
        return;
      }

      tasks.push(data[0]);
      input.value = '';
      render();
    }

    async function completeTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;

      task.completed = !task.completed;

      const { error } = await supabase
        .from('tasks')
        .update({ completed: task.completed })
        .eq('id', id);

      if (error) console.error('Error updating task:', error);
      render();
    }

    async function toggleFollowup(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;

      task.followup = !task.followup;

      const { error } = await supabase
        .from('tasks')
        .update({ followup: task.followup })
        .eq('id', id);

      if (error) console.error('Error updating followup:', error);
      render();
    }

    function toggleNotesEditor(id) {
      expandedNotes[id] = !expandedNotes[id];
      render();
    }

    async function addNote(id) {
      const textarea = document.getElementById('note-input-' + id);
      const text = textarea.value.trim();
      if (!text) return;

      const task = tasks.find(t => t.id === id);
      if (!task) return;

      if (!Array.isArray(task.notes)) task.notes = [];
      
      const newNote = {
        text: text,
        date: new Date().toISOString().split('T')[0]
      };
      
      task.notes.push(newNote);

      const { error } = await supabase
        .from('tasks')
        .update({ notes: task.notes })
        .eq('id', id);

      if (error) {
        console.error('Error adding note:', error);
        return;
      }

      textarea.value = '';
      render();
    }

    function getStatusBadges(task) {
      let badges = '';
      if (task.completed && task.followup) {
        badges += '<span class="badge badge-partial">completed + follow-up</span>';
      } else if (task.completed) {
        badges += '<span class="badge badge-complete">completed</span>';
      }
      if (task.followup && !task.completed) {
        badges += '<span class="badge badge-followup">follow-up needed</span>';
      }
      return badges;
    }

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    function render() {
      let filtered = tasks;
      if (currentTab === 'todo') {
        filtered = tasks.filter(t => !t.completed);
      } else if (currentTab === 'followup') {
        filtered = tasks.filter(t => t.followup);
      }

      const html = filtered.length === 0
        ? '<div class="empty-state">No tasks in this view</div>'
        : filtered.map(task => {
          const isExpanded = expandedNotes[task.id];
          let cardClass = 'task-card';
          if (task.completed) cardClass += ' is-complete';
          if (task.followup) cardClass += ' is-followup';

          let notesHtml = '';
          if (Array.isArray(task.notes) && task.notes.length > 0) {
            notesHtml = '<div class="task-notes-display">' +
              task.notes.map(n => '<div class="note-entry"><span class="note-date">' + n.date + ':</span> ' + escapeHtml(n.text) + '</div>').join('') +
              '</div>';
          }

          let editorHtml = '';
          if (isExpanded) {
            editorHtml = '<div class="notes-editor">' +
              '<textarea id="note-input-' + task.id + '" placeholder="Add a note..."></textarea>' +
              '<button onclick="addNote(' + task.id + ')">Save Note</button>' +
              '</div>';
          }

          return '<div class="' + cardClass + '">' +
            '<div class="task-top">' +
              '<span class="task-number">#' + task.number + '</span>' +
              '<div class="task-content">' +
                '<div class="task-text ' + (task.completed ? 'done' : '') + '">' + escapeHtml(task.text) + getStatusBadges(task) + '</div>' +
              '</div>' +
              '<div class="task-actions">' +
                '<button class="btn-complete" onclick="completeTask(' + task.id + ')">' + (task.completed ? 'Undo' : '✓') + '</button>' +
                '<button class="btn-followup" onclick="toggleFollowup(' + task.id + ')">' + (task.followup ? 'Remove F/U' : 'F/U') + '</button>' +
                '<button class="btn-notes" onclick="toggleNotesEditor(' + task.id + ')">Notes</button>' +
              '</div>' +
            '</div>' +
            notesHtml +
            editorHtml +
          '</div>';
        }).join('');

      document.getElementById('taskList').innerHTML = html;

      const total = tasks.length;
      const complete = tasks.filter(t => t.completed).length;
      const remaining = tasks.filter(t => !t.completed).length;
      const followup = tasks.filter(t => t.followup).length;

      document.getElementById('totalCount').textContent = total;
      document.getElementById('completeCount').textContent = complete;
      document.getElementById('remainingCount').textContent = remaining;
      document.getElementById('followupCount').textContent = followup;
    }

    document.getElementById('newTask').addEventListener('keypress', e => {
      if (e.key === 'Enter') addTask();
    });

    init();
  </script>
</body>
</html>
